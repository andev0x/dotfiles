#=============================================================
# TMUX CONFIG — FINAL REFINED MINIMAL
# Author: andev0x
# Philosophy:
# - Minimal but informative
# - Calm visual hierarchy
# - Focus-first workflow
# - Premium dark developer aesthetic
# ==============================================================


# ========================
# 1. GENERAL SETTINGS
# ========================

set -g mouse on

# Faster escape handling without breaking Alt/meta keys
set -sg escape-time 10

# Scrollback history
set -g history-limit 50000

# Start window and pane indices at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Better terminal integration
set -g focus-events on
set -g set-clipboard on
set -g display-time 1500

# Terminal capabilities
set -g default-terminal "tmux-256color"

# Modern RGB color support
set -sa terminal-features ",*:RGB"

# Enable extended keyboard protocol
set -g extended-keys on
set -g extended-keys-format csi-u

# Use Vim motions in copy mode
setw -g mode-keys vi

# Smart automatic window naming
# - Show current directory for shells
# - Show process name for applications
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'


# ========================
# 2. COLOR PALETTE
# ========================

# Background colors
bg="#0b1410"
surface="#111815"
surface_alt="#161f1b"

# Foreground colors
fg="#d7e3dc"
muted="#66706b"
subtle="#7d8b86"

# Accent colors
green="#8fbf87"
blue="#7a8fa3"
orange="#d8a46b"

# Border color
border="#1a2621"


# ========================
# 3. KEYBINDINGS
# ========================

# Prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# Toggle pane zoom
bind z resize-pane -Z

# Split panes while preserving working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload tmux configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message "✔ Config reloaded"

# Safe kill actions
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind X confirm-before -p "Kill window? (y/n)" kill-window
bind Q confirm-before -p "Kill session? (y/n)" kill-session

# Refresh git cache manually
bind u run-shell "~/.config/tmux/scripts/git-update.sh '#{pane_current_path}'"


# ========================
# 4. POPUPS
# ========================

# Floating shell popup
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "$SHELL"

# Persistent scratch popup
bind P display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  "tmux new-session -A -s scratch"

# Lazygit popup
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "sh -c 'command -v lazygit >/dev/null && lazygit || (echo \"lazygit not installed\"; read); ~/.config/tmux/scripts/git-update.sh \"#{pane_current_path}\"'"

# Yazi popup
bind y display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "sh -c 'command -v yazi >/dev/null && yazi || (echo \"yazi not installed\"; read); ~/.config/tmux/scripts/git-update.sh \"#{pane_current_path}\"'"


# ========================
# 5. STATUS BAR
# ========================

set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style "bg=${bg},fg=${muted}"


# ---------------------------------------------------------
# LEFT: SESSION
# ---------------------------------------------------------

set -g status-left-length 40

# Flat session text keeps alignment visually clean
set -g status-left "\
#[fg=${green},bold] #S"


# ---------------------------------------------------------
# CENTER: WINDOWS
# ---------------------------------------------------------

setw -g window-status-separator "  "

# Inactive windows
setw -g window-status-format "\
#[fg=${muted},bg=${bg}]#I·#{=12:window_name}"

# Active window
# Keep a single capsule in the center as the focus anchor
setw -g window-status-current-format "\
#[fg=${surface_alt},bg=${bg}]\
#[fg=${orange},bg=${surface_alt},bold]#I \
#[fg=${fg},bg=${surface_alt}]#{=14:window_name}\
#[fg=${surface_alt},bg=${bg}]"


# ---------------------------------------------------------
# RIGHT: SYSTEM INFO
# ---------------------------------------------------------

set -g status-right-length 120

set -g status-right "\
#[fg=${blue},bg=${bg}]#(~/.config/tmux/scripts/git-read.sh \"#{pane_current_path}\") \
#[fg=${muted},bg=${bg}]󰍛 #(~/.config/tmux/scripts/cpu.sh) \
#[fg=${subtle},bg=${bg}]#{user}@#{host_short} \
#[fg=${green},bg=${bg},bold] %H:%M"

# ========================
# 6. PANE VISUALS
# ========================

# Pane borders
set -g pane-border-style "fg=${border}"
set -g pane-active-border-style "fg=${green}"

# Message styling
set -g message-style "fg=${bg},bg=${green},bold"

# Copy mode selection styling
set -g mode-style "fg=${bg},bg=${blue}"


# ========================
# 7. COPY MODE
# ========================

# Start visual selection with "v"
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Cross-platform clipboard integration
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'if-shell "command -v wl-copy >/dev/null 2>&1" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
    "if-shell \"command -v xclip >/dev/null 2>&1\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \\\"xclip -selection clipboard\\\"\" \
      \"bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel\""'


# ========================
# 8. PLUGINS
# ========================

# TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Seamless navigation between tmux and Neovim
set -g @plugin 'christoomey/vim-tmux-navigator'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
